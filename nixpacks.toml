providers = ["php"]

[phases.setup]
pkgs = [
    "php82",
    "php82Extensions.bcmath", "php82Extensions.ctype", "php82Extensions.curl",
    "php82Extensions.dom", "php82Extensions.gd", "php82Extensions.iconv",
    "php82Extensions.intl", "php82Extensions.mbstring", "php82Extensions.openssl",
    "php82Extensions.pdo", "php82Extensions.pdo_mysql", # Oder pdo_pgsql
    "php82Extensions.simplexml", "php82Extensions.tokenizer", "php82Extensions.xml",
    "php82Extensions.zip", "php82Extensions.sockets",
    "composer", "nginx", "nodejs_22", "npm",
    "python311Packages.supervisor",
    "shadow",
]

[phases.install]
cmds = [
    "composer install --no-dev --no-progress --optimize-autoloader",
    "npm install",
    "groupadd -g 82 www-data || true",
    "useradd -u 82 -g www-data -s /sbin/nologin www-data || true"
]

[phases.build]
cmds = [
    "mkdir -p /var/log/supervisor", # Für Supervisor-Logs
    "mkdir -p /app/storage/logs", # Für Craft Logs
    "mkdir -p /app/storage/runtime", # Für Craft Runtime-Dateien (Cache, etc.)
    "mkdir -p /etc/supervisor/conf.d/",

    "cp /assets/supervisord.conf /etc/supervisord.conf",
    "cp /assets/worker-*.conf /etc/supervisor/conf.d/",
    "cp /assets/nginx.conf /etc/nginx.conf", # Unsere statische Nginx-Config
    "cp /assets/php-fpm.conf /etc/php-fpm.conf", # Unsere PHP-FPM Config

    "chmod +x /assets/start.sh",

    "chown -R www-data:www-data /var/log /app/storage /etc/supervisor"
]

[phases.postBuild]
cmds = [
    "composer install --no-dev --no-progress --optimize-autoloader",
    "php craft migrate/all --interactive=0",
    "php craft project-config/apply --interactive=0",
]
# dependsOn = ["build"] # Nixpacks macht dies implizit

[start]
# Verwendet unser Start-Skript, das Supervisor startet
cmd = "/assets/start.sh"

# --- Eingebettete Konfigurationsdateien und Skripte ---
[staticAssets]

# Start-Skript, das nur Supervisor startet
"start.sh" = '''
#!/bin/bash
# Startet Supervisor, der Nginx, PHP-FPM (und ggf. Queue Worker) managt
echo "Starting Supervisor..."
exec /usr/bin/supervisord -c /etc/supervisord.conf -n
'''

# Supervisor Hauptkonfiguration (Ähnlich Laravel-Beispiel)
"supervisord.conf" = '''
[unix_http_server]
file=/tmp/supervisor.sock ; Kommunikation via Unix socket

[supervisord]
logfile=/var/log/supervisor/supervisord.log ; Haupt-Logdatei
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/tmp/supervisord.pid
nodaemon=false ; Wichtig: Muss im Vordergrund laufen, damit der Container nicht stoppt
minfds=1024
minprocs=200
user=root ; Supervisord selbst läuft als root, startet Kindprozesse aber ggf. anders

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock ; Verbindung zum Server via Socket

[include]
files = /etc/supervisor/conf.d/*.conf ; Lädt alle Worker-Konfigurationen
'''

# Supervisor Worker: Nginx
"worker-nginx.conf" = '''
[program:nginx]
command=nginx -g 'daemon off;' ; Startet Nginx im Vordergrund (von Supervisor gemanagt)
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx.error.log
'''

# Supervisor Worker: PHP-FPM
"worker-phpfpm.conf" = '''
[program:php-fpm]
command=php-fpm -c /etc/ -y /etc/php-fpm.conf -F ; Startet PHP-FPM im Vordergrund
autostart=true
autorestart=true
priority=5
stdout_logfile=/var/log/supervisor/php-fpm.log
stderr_logfile=/var/log/supervisor/php-fpm.error.log
'''

# Supervisor Worker: Craft Queue Worker (Optional - Einkommentieren, wenn benötigt)
#"worker-craft-queue.conf" = '''
