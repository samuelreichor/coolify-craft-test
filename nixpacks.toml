#autostart=true
#autorestart=true
#user=www-data ; Als www-data ausführen
#numprocs=1 ; Anzahl der Worker-Prozesse
#startsecs=0
#stopwaitsecs=3600 ; Max. Zeit für Graceful Shutdown
#stdout_logfile=/var/log/supervisor/craft-queue.log
#stderr_logfile=/var/log/supervisor/craft-queue.error.log
#'''

# PHP-FPM Pool Konfiguration (Hört auf TCP Port 9000)
"php-fpm.conf" = '''
[www]
listen = 127.0.0.1:9000
;listen = /var/run/php/php-fpm.sock ; Alternative: Unix Socket
user = www-data
group = www-data
;listen.owner = www-data ; Nur für Socket nötig
;listen.group = www-data ; Nur für Socket nötig
pm = dynamic
pm.max_children = 50
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.start_servers = 10
;pm.process_idle_timeout = 10s;
;pm.max_requests = 500
clear_env = no
catch_workers_output = yes
'''

# Nginx Konfiguration für Craft CMS (Kein Template, statisch)
"nginx.conf" = '''
user www-data www-data;
worker_processes auto; # Automatisch an CPU-Kerne anpassen
pid /run/nginx.pid;
# include /etc/nginx/modules-enabled/*.conf; # Normalerweise nicht in Containern nötig

events {
    worker_connections 768;
    # multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    # server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip Compression (Optional)
    # gzip on;
    # gzip_disable "msie6";
    # gzip_vary on;
    # gzip_proxied any;
    # gzip_comp_level 6;
    # gzip_buffers 16 8k;
    # gzip_http_version 1.1;
    # gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Haupt-Server-Block
    server {
        # Hört auf den internen Port, den Coolify/Nixpacks bereitstellt (meist 80)
        listen ${PORT:-80};

        server_name _; # Platzhalter, Coolify managt externen Hostnamen

        # Pfad zum 'web' Verzeichnis von Craft
        root /app/web;
        index index.php;

        charset utf-8;

        # Craft CMS Pretty URLs / Routing
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Statische Dateien direkt ausliefern (Optional Caching)
        location ~* \.(?:css|js|map|jpe?g|gif|png|ico|svg|woff2?)$ {
          expires 7d;
          access_log off;
          add_header Cache-Control "public";
        }

        # PHP-FPM Verarbeitung
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;

            # Übergabe an PHP-FPM via TCP Port (wie in php-fpm.conf definiert)
            fastcgi_pass 127.0.0.1:9000;
            # Falls PHP-FPM Socket verwendet wird:
            # fastcgi_pass unix:/var/run/php/php-fpm.sock;

            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 300s; # Längeres Timeout
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
        }

        # Sicherheitsregeln für Craft
        location ~ /\. { deny all; }
        location ~ /composer\.(?:json|lock)$ { deny all; }
        location ~ ^/config/ { deny all; }
        location ~ ^/storage/ { deny all; }
        location ~ ^/templates/ { deny all; }
        location ~ ^/vendor/ { deny all; }
        location = /robots.txt { access_log off; log_not_found off; }
        location = /favicon.ico { access_log off; log_not_found off; }
    }
}
'''